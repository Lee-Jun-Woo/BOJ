        <h2>생물군계(biome)</h2>
        <p>마인크래프트에서 <strong><a href="https://minecraft.fandom.com/wiki/Biome" target="_blank" title="BIOME - minecraft wiki"><u>생물군계</u>(biome)</a></strong>
        는 특정 기후를 가지는 지역의 종류이다. 고유의 기온과 잔디와 물 등의 색상을 가진다.</p>
        <p style="margin-top: 35px;">기온은 비가 오는 날씨에서 비/눈/흐림 상태를 결정하는 요소이다. 잔디와 물의 색상은 기온에 따라 변하는 요소의 하나이다. 또한, 허스크처럼 특정 생물군계에서만 생성되는 몹도 있다.</p>
